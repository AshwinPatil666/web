<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            background-color: rgb(78, 54, 4);
            height:5vh;
            width:100%;
            border-radius:20px;
            color: white;
            position:sticky;
            top:0;
            text-align: center;
                
        }
        div{

            background-color: rgb(211, 199, 151);
            margin: 20px 0  ;
            height: 50vh;
            width: 100%;
            display: flex;
            align-items: center;
            border-radius: 20px;
            position:relative;

        }
        button{
            background-color:  rgb(140, 98, 13);
            border: rgb(139, 118, 41) solid 1px;
            color: whitesmoke;
            font-size: 16px;
            margin: 0 10px;
            cursor: pointer;
       }



       #home{
        position:absolute;
        top:10px;
        left:10px; 
        border-radius:10px;
        height:5vh;
        width:10vw;
       }
       #About{
        position:absolute;
        top:10px;
        right:10px;
        border-radius:10px;
        height:5vh;
        width:10vw;

       }

         #COn{
        position:absolute;
        bottom:10px;
        right:10px;
        border-radius:10px;
        height:5vh;
        width:10vw;

         }
        #SUB{
        position:absolute;
        bottom:10px;
        left:10px; 
        border-radius:10px;
        height:5vh;
        width:10vw;

       

       }
        #ser{
        position:absolute;
        top :45%;
        bottom:45%;
        right:45%;
        left:45%;
        border-radius:10px;
        height:5vh;
        width:10vw;

       

       }
         button:hover{
            background-color:rgb(206, 168, 64);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <nav >Welcome to My Website</nav>
    <div>
        <button id="home">Home</button>
        <button id="About">About</button>
        <button id="COn">Contact</button>
        <button id="ser">Services</button>
        <button id="SUB">Subscribe</button>
    </div>

</body>
</html>
