<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 

   <style>
      .cont{
       background-color: rgb(25, 21, 15,.5);
       height:100px;
       width:50%;
       border-color: solid black;
       display: flex;
       grid-template-columns: 60px 60px ;
       gap:50px;
       
      }

      .Box1{
        height: 20px;
         width: 20px;
       background-color: bisque;
       flex-grow: 1;
       grid-area: auto;
        }

       .Box2{
        height: 20px;
        width: 20px;
         background-color: bisque;
         flex-grow: 2;
         grid-area: auto;
      }
       .Box3{
        height: 20px;
        width: 20px;
         background-color: bisque;
      } .Box4{
        height: 20px;
        width: 20px;
         background-color: bisque;
      }
       .Box5{
        height: 20px;
        width: 20px;
        background-color:   bisque;
      }
    </style>
</head>
<body>
  <div class="cont">
        <div class="Box1"></div>
        <div class="Box2"></div>
        <div class="Box3"></div>
        <div class="Box4"></div>
        <div class="Box5"></div>

  </div>
</body>    
</html>
