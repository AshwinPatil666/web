<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="font-size: 20px">this is 20px <!-- 20px is a fixed size, it will always be 20 pixels regardless of the font size of the element -->
       <div style="font-size: 5em">this is 30px  <!-- 1em is equal to the current font size of the element, so 2em is 2 times the current font size -->
          <div style="font-size: 3rem">this is 30px <!-- 1rem is equal to the font size of the root element (html), so 2rem is 2 times the root font size -->
             <div style="font-size: 4vw">this is 40px <!-- 1vw is equal to 1% of the viewport width, so 100vw is the full width of the viewport -->
                <div style="font-size: 4vh">this is 40px <!-- 1vh is equal to 1% of the viewport height, so 100vh is the full height of the viewport -->
                    <div style="width: 50vw; height: 50vh; background-color: rgba(231, 78, 78, 0.5);"> <!-- This div will be 50% of the viewport width and 50% of the viewport height -->
          <div sytle ="font-size: 10em">this is 480px</div> <!-- 1rem is equal to the font size of the root element (html), so 2rem is 2 times the root font size -->
</body>
</html>
