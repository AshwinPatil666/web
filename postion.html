<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            position: relative;
            /* This will make the parent element a positioning context for the child */
            background-color: yellow;
            width: 40vw;
            height: 40vh;
        }
        
        .child {
            background-color: blue;
            width: 10vw;
            height: 10vh;
            position: absolute;
            left: 500px;
            top: 100px;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="child">
        </div>
    </div>

</body>

</html>
